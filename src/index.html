<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss: http: https:;">
  <title>ChasparkIPClaw</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- 标题栏（自定义） -->
  <div class="title-bar">
    <div class="title-bar-drag">
      <span class="app-icon">🦞</span>
      <span class="app-title">ChasparkIPClaw</span>
    </div>
    <div class="title-bar-controls">
      <button class="title-btn minimize" id="btn-minimize" title="最小化">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect y="5" width="12" height="2" fill="currentColor"/>
        </svg>
      </button>
      <button class="title-btn maximize" id="btn-maximize" title="最大化">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
      </button>
      <button class="title-btn close" id="btn-close" title="关闭">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="main-container">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <!-- 搜索框 -->
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="搜索会话..." id="search-input">
      </div>

      <!-- 添加会话按钮 -->
      <button class="add-session-btn" id="add-session-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>新建会话</span>
      </button>

      <!-- 会话列表 -->
      <div class="session-list" id="session-list">
        <!-- 会话项会动态生成 -->
        <div class="session-item active">
          <span class="session-icon">💬</span>
          <span class="session-name">新对话</span>
          <span class="session-time">刚刚</span>
        </div>
      </div>

      <!-- 底部菜单 -->
      <div class="sidebar-bottom">
        <div class="menu-item" id="menu-inspiration">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <span>灵感广场</span>
        </div>
        <div class="menu-item" id="menu-tasks">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12,6 12,12 16,14"/>
          </svg>
          <span>定时任务</span>
        </div>
      </div>

      <!-- 底部图标 -->
      <div class="sidebar-footer">
        <button class="footer-btn" id="btn-welink" title="绑定 WeLink">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="footer-btn" id="btn-settings" title="系统设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content">
      <!-- 会话输出区域 -->
      <div class="chat-area" id="chat-area">
        <!-- 欢迎界面（无会话时显示） -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-logo">
            <span class="logo-icon">🦞</span>
            <h1 class="logo-text">ChasparkIPClaw</h1>
            <p class="logo-subtitle">智能知识产权助手</p>
          </div>
          
          <div class="quick-tips">
            <h3>💡 专利检索技巧</h3>
            <div class="tips-grid">
              <div class="tip-card">
                <span class="tip-icon">🔍</span>
                <span class="tip-title">关键词检索</span>
                <span class="tip-desc">使用技术关键词快速定位专利</span>
              </div>
              <div class="tip-card">
                <span class="tip-icon">📊</span>
                <span class="tip-title">分类号检索</span>
                <span class="tip-desc">通过IPC/CPC分类精准筛选</span>
              </div>
              <div class="tip-card">
                <span class="tip-icon">👤</span>
                <span class="tip-title">申请人检索</span>
                <span class="tip-desc">追踪竞争对手专利布局</span>
              </div>
              <div class="tip-card">
                <span class="tip-icon">📅</span>
                <span class="tip-title">时间范围</span>
                <span class="tip-desc">限定申请日/公开日范围</span>
              </div>
            </div>
          </div>

          <div class="skills-section">
            <h3>🛠️ 常用技能</h3>
            <div class="skills-list">
              <button class="skill-btn" data-skill="patent-search">
                <span class="skill-icon">🔎</span>
                <span>专利检索</span>
              </button>
              <button class="skill-btn" data-skill="prior-art">
                <span class="skill-icon">📚</span>
                <span>现有技术分析</span>
              </button>
              <button class="skill-btn" data-skill="claim-draft">
                <span class="skill-icon">✍️</span>
                <span>权利书撰写</span>
              </button>
              <button class="skill-btn" data-skill="patent-analysis">
                <span class="skill-icon">📈</span>
                <span>专利分析报告</span>
              </button>
              <button class="skill-btn" data-skill="trademark-search">
                <span class="skill-icon">™️</span>
                <span>商标查询</span>
              </button>
              <button class="skill-btn" data-skill="ip-consult">
                <span class="skill-icon">💼</span>
                <span>IP咨询</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 消息列表（会话进行中显示） -->
        <div class="messages-container" id="messages-container" style="display: none;">
          <!-- 消息会动态生成 -->
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="input-area">
        <div class="input-container">
          <div class="attachment-preview" id="attachment-preview" style="display: none;">
            <div class="attachment-item">
              <span class="attachment-name"></span>
              <button class="attachment-remove">×</button>
            </div>
          </div>
          <textarea 
            class="message-input" 
            id="message-input" 
            placeholder="输入您的问题或指令..."
            rows="1"
          ></textarea>
          <div class="input-actions">
            <button class="action-btn attachment-btn" id="btn-attachment" title="上传附件">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button class="action-btn send-btn" id="btn-send" title="发送">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22,2 15,22 11,13 2,9"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-hint">
          <span>按 Enter 发送，Shift + Enter 换行</span>
          <span class="status-indicator" id="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">服务运行中</span>
          </span>
        </div>
      </div>
    </main>
  </div>

  <!-- 设置面板（隐藏） -->
  <div class="settings-panel" id="settings-panel" style="display: none;">
    <div class="settings-header">
      <h2>系统设置</h2>
      <button class="close-btn" id="close-settings">×</button>
    </div>
    <div class="settings-content">
      <div class="settings-group">
        <h3>服务配置</h3>
        <div class="setting-item">
          <label>OpenClaw 端口</label>
          <input type="number" id="setting-port" value="18789" min="1024" max="65535">
        </div>
        <div class="setting-item">
          <label>服务状态</label>
          <span id="setting-status">运行中</span>
          <button class="btn-secondary" id="btn-restart-service">重启服务</button>
        </div>
      </div>
      <div class="settings-group">
        <h3>模型配置</h3>
        <div class="setting-item">
          <label>默认模型</label>
          <select id="setting-model">
            <option value="gpt-4">GPT-4</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
            <option value="claude-3">Claude 3</option>
          </select>
        </div>
      </div>
      <div class="settings-group">
        <h3>界面设置</h3>
        <div class="setting-item">
          <label>开机自启动</label>
          <input type="checkbox" id="setting-autostart">
        </div>
        <div class="setting-item">
          <label>关闭时最小化到托盘</label>
          <input type="checkbox" id="setting-minimize-tray" checked>
        </div>
      </div>
    </div>
  </div>

  <!-- 遮罩层 -->
  <div class="overlay" id="overlay" style="display: none;"></div>

  <script src="scripts/renderer.js"></script>
</body>
</html>
